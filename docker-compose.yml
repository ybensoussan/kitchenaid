services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/app/data/kitchenaid.db
      - UPLOADS_DIR=/app/uploads
      - PORT=8080
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
