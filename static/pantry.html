<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantry — KitchenAid</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/theme.js"></script>
  <style>
    .pantry-container { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem; }
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius)*1.5);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .add-form .form-group { margin: 0; flex: 1; }
    .pantry-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius)*1.5);
      overflow: hidden;
    }
    .pantry-search {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .pantry-list { list-style: none; padding: 0; margin: 0; }
    .pantry-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .pantry-item:last-child { border-bottom: none; }
    .pantry-item-name { flex: 1; font-weight: 500; }
    .pantry-item-price { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }
    .pantry-item-edit { display: none; flex: 1; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .pantry-item-edit .form-input { font-size: 0.85rem; padding: 0.3rem 0.5rem; }
    .price-lookup-btn { font-size: 0.8rem; padding: 0.15rem 0.4rem; color: var(--muted); }
    .price-lookup-btn:hover { color: var(--brand); }

    /* AH picker modal body */
    .ah-product-list { display: flex; flex-direction: column; gap: 0; max-height: 420px; overflow-y: auto; }
    .ah-product-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 1rem; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .ah-product-item:last-child { border-bottom: none; }
    .ah-product-item:hover { background: var(--hover-bg); }
    .ah-product-thumb { width: 56px; height: 56px; object-fit: contain; border-radius: 4px; flex-shrink: 0; background: #f5f5f5; }
    .ah-product-thumb-placeholder { width: 56px; height: 56px; flex-shrink: 0; background: var(--hover-bg); border-radius: 4px; }
    .ah-product-info { flex: 1; min-width: 0; }
    .ah-product-title { font-size: 0.9rem; font-weight: 500; }
    .ah-product-size { font-size: 0.78rem; color: var(--muted); }
    .ah-product-price { font-size: 0.9rem; font-weight: 600; color: var(--brand); white-space: nowrap; }
    .ah-picker-loading { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
    .pantry-item.editing .pantry-item-view { display: none; }
    .pantry-item.editing .pantry-item-edit { display: flex; }
    .pantry-item-view { display: flex; align-items: center; gap: 0.75rem; flex: 1; }
    .empty-state { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }
    .btn-icon { padding: 0.2rem 0.4rem; font-size: 0.85rem; }
    .pantry-filter-btn {
      font-size: .78rem; padding: .2rem .65rem; border-radius: 999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: background .12s, color .12s, border-color .12s;
    }
    .pantry-filter-btn:hover { background: var(--hover-bg); color: var(--text); }
    .pantry-filter-btn.active { background: var(--brand); border-color: var(--brand); color: #fff; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">Kitchen<span>Aid</span></a>
    <nav class="header-nav">
      <a href="/" class="btn btn-secondary btn-icon" title="Recipes"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></a>
      <a href="/settings.html" class="btn btn-secondary btn-icon" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
      <label class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode"><input type="checkbox" id="theme-toggle-btn"><span class="theme-toggle-track"><svg class="toggle-icon toggle-sun" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="2.5" fill="currentColor"/><path d="M8 1.5V3M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M12.6 3.4l-1.1 1.1M4.5 11.5l-1.1 1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span class="theme-toggle-thumb"></span><svg class="toggle-icon toggle-moon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 10A5.5 5.5 0 0 1 6 2.5a.49.49 0 0 0-.6-.65A6 6 0 1 0 14.15 10.5a.49.49 0 0 0-.65-.5z" fill="currentColor"/></svg></span></label>
    </nav>
  </div>
</header>

<main class="pantry-container">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
    <h1 class="page-title"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:.3rem"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg> Pantry</h1>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      <button id="refresh-unpriced-btn" class="btn btn-secondary">&#x21BB; Price Unpriced</button>
      <button id="refresh-prices-btn" class="btn btn-secondary">&#x21BB; Refresh All Prices</button>
    </div>
  </div>

  <!-- Add form -->
  <div class="add-form">
    <div class="form-group">
      <label class="form-label" for="new-name">Ingredient name *</label>
      <input type="text" id="new-name" class="form-input" placeholder="e.g. flour">
    </div>
    <button id="add-btn" class="btn btn-primary">Add</button>
  </div>

  <!-- Search + list -->
  <div class="pantry-table">
    <div class="pantry-search" style="display:flex;flex-direction:column;gap:.5rem">
      <input type="search" id="search-input" class="form-input" placeholder="Search pantry…" autocomplete="off">
      <div id="pantry-filters" style="display:flex;gap:.35rem;flex-wrap:wrap">
        <button class="pantry-filter-btn active" data-filter="all">All</button>
        <button class="pantry-filter-btn" data-filter="unpriced">Unpriced</button>
        <button class="pantry-filter-btn" data-filter="priced">Priced</button>
      </div>
    </div>
    <ul class="pantry-list" id="pantry-list">
      <li class="empty-state">Loading…</li>
    </ul>
  </div>
</main>

<div id="toast-container" class="toast-container"></div>

<!-- AH Price Picker Modal -->
<div id="ah-picker-modal" class="modal-overlay">
  <div class="modal" style="width:min(540px,94vw)">
    <div class="modal-header">
      <h2 class="modal-title">AH Price Lookup: <span id="ah-picker-name"></span></h2>
      <button class="modal-close btn btn-ghost btn-icon">✕</button>
    </div>
    <div class="ah-picker-search">
      <div style="display:flex;gap:.5rem;padding:.75rem 1rem;border-bottom:1px solid var(--border)">
        <input id="ah-search-input" type="text" class="form-input" placeholder="Search AH…" style="flex:1;min-width:0">
        <button id="ah-search-btn" class="btn btn-primary" style="white-space:nowrap;flex-shrink:0">Search</button>
      </div>
    </div>
    <div id="ah-picker-body"></div>
  </div>
</div>

<!-- Price Refresh Modal -->
<div id="price-refresh-modal" class="modal-overlay">
  <div class="modal" style="width:min(600px,96vw)">
    <div class="modal-header">
      <h2 class="modal-title">Refresh Prices</h2>
      <button class="modal-close btn btn-ghost btn-icon" id="price-refresh-close">✕</button>
    </div>
    <div id="price-refresh-body" style="padding:1rem 1.25rem;min-height:120px"></div>
    <div class="modal-footer" id="price-refresh-footer" style="display:none;padding:.75rem 1.25rem;border-top:1px solid var(--border);justify-content:flex-end;gap:.5rem">
      <button id="price-refresh-cancel" class="btn btn-secondary">Cancel</button>
      <button id="price-refresh-apply" class="btn btn-primary">Apply selected</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
(async () => {
  let items = [];

  function showToast(msg, isError = false) {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast' + (isError ? ' error' : '');
    t.textContent = msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Strip leading quantity + unit tokens from an ingredient name.
  // e.g. "2 cups flour" → "Flour", "100g chicken" → "Chicken"
  function normalizeName(raw) {
    let s = raw.trim();
    // Remove leading number (including fractions like 1/2) followed by optional unit
    const units = 'cups?|tbsps?|tsps?|tablespoons?|teaspoons?|kg|g|mg|ml|l|oz|lbs?|pounds?|ounces?|pieces?|cans?|cloves?|bunche?s?|slices?|sprigs?|pinch(?:es)?|dashes?|stuks?|stuk';
    s = s.replace(new RegExp(`^[\\d¼½¾⅓⅔⅛⅜⅝⅞][\\d\\s/.]*(${units})\\.?\\s*`, 'i'), '');
    // Remove any remaining leading plain number
    s = s.replace(/^[\d][[\d\s/.]*\s+/, '');
    // Remove parenthetical size info like "(14 oz)"
    s = s.replace(/\s*\([^)]*\)/g, '');
    s = s.trim();
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  let activeFilter = 'all';

  async function loadItems() {
    try {
      items = await api.listPantryItems();
    } catch (e) {
      showToast('Failed to load pantry: ' + e.message, true);
      items = [];
    }
    renderList(document.getElementById('search-input').value);
  }

  function applyFilter(it) {
    if (activeFilter === 'unpriced') return !(it.price > 0);
    if (activeFilter === 'priced')   return it.price > 0;
    return true;
  }

  function renderList(query = '') {
    const list = document.getElementById('pantry-list');
    const q = query.toLowerCase();
    const filtered = items.filter(it => it.name.toLowerCase().includes(q) && applyFilter(it));

    if (filtered.length === 0) {
      const msg = items.length === 0 ? 'No pantry items yet. Add one above.'
        : activeFilter !== 'all' ? `No ${activeFilter} items${q ? ' matching your search' : ''}.`
        : 'No results.';
      list.innerHTML = `<li class="empty-state">${msg}</li>`;
      return;
    }

    list.innerHTML = filtered.map(it => `
      <li class="pantry-item" data-id="${it.id}">
        <div class="pantry-item-view">
          <span class="pantry-item-name">${escHtml(it.name)}</span>
          <span class="pantry-item-price">${it.price > 0 ? `€${it.price.toFixed(2)} / ${escHtml(it.price_unit_size)}` : '—'}</span>
          <button class="price-lookup-btn btn btn-ghost btn-icon btn-sm" data-id="${it.id}" data-name="${escHtml(it.name)}" title="Look up price on AH">€</button>
          <button class="btn btn-ghost btn-icon edit-btn" title="Edit">✏</button>
          <button class="btn btn-ghost btn-icon delete-btn" title="Delete" style="color:#dc2626">🗑</button>
        </div>
        <div class="pantry-item-edit">
          <input type="text" class="form-input edit-name" value="${escHtml(it.name)}" placeholder="Name" style="flex:1;min-width:120px">
          <input type="number" class="form-input edit-price" value="${it.price > 0 ? it.price : ''}" step="0.01" placeholder="€ price" style="width:90px">
          <input type="text" class="form-input edit-price-size" value="${escHtml(it.price_unit_size)}" placeholder="e.g. 300 g" style="width:100px">
          <button class="btn btn-primary btn-sm save-edit-btn">Save</button>
          <button class="btn btn-secondary btn-sm cancel-edit-btn">Cancel</button>
        </div>
      </li>`).join('');

    list.querySelectorAll('.pantry-item').forEach(el => {
      const id = parseInt(el.dataset.id, 10);
      const item = items.find(it => it.id === id);

      el.querySelector('.edit-btn').addEventListener('click', () => {
        el.classList.add('editing');
        el.querySelector('.edit-name').focus();
      });

      el.querySelector('.cancel-edit-btn').addEventListener('click', () => {
        el.classList.remove('editing');
      });

      el.querySelector('.save-edit-btn').addEventListener('click', async () => {
        const name           = normalizeName(el.querySelector('.edit-name').value);
        const price          = parseFloat(el.querySelector('.edit-price').value) || 0;
        const price_unit_size = el.querySelector('.edit-price-size').value.trim();
        if (!name) { showToast('Name is required', true); return; }
        try {
          await api.updatePantryItem(id, { name, price, price_unit_size });
          await loadItems();
        } catch (e) {
          showToast('Update failed: ' + e.message, true);
        }
      });

      el.querySelector('.price-lookup-btn').addEventListener('click', () => {
        openAHPicker(id, item.name);
      });

      el.querySelector('.delete-btn').addEventListener('click', async () => {
        if (!confirm(`Delete "${item.name}" from pantry?`)) return;
        try {
          await api.deletePantryItem(id);
          await loadItems();
        } catch (e) {
          showToast('Delete failed: ' + e.message, true);
        }
      });
    });
  }

  // ── Add new item ──────────────────────────────────────────────────────────

  document.getElementById('add-btn').addEventListener('click', async () => {
    const nameIn = document.getElementById('new-name');
    const name   = normalizeName(nameIn.value);
    if (!name) { showToast('Name is required', true); nameIn.focus(); return; }
    try {
      await api.createPantryItem({ name });
      nameIn.value = '';
      nameIn.focus();
      await loadItems();
    } catch (e) {
      showToast('Add failed: ' + e.message, true);
    }
  });

  document.getElementById('new-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('add-btn').click();
  });

  // ── Search ────────────────────────────────────────────────────────────────

  document.getElementById('search-input').addEventListener('input', e => {
    renderList(e.target.value);
  });

  document.getElementById('pantry-filters').addEventListener('click', e => {
    const btn = e.target.closest('.pantry-filter-btn');
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.pantry-filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderList(document.getElementById('search-input').value);
  });

  // ── AH Price Picker ───────────────────────────────────────────────────────

  const ahModal       = document.getElementById('ah-picker-modal');
  const ahPickerName  = document.getElementById('ah-picker-name');
  const ahPickerBody  = document.getElementById('ah-picker-body');
  const ahSearchInput = document.getElementById('ah-search-input');
  const ahSearchBtn   = document.getElementById('ah-search-btn');
  let ahTargetId   = null;
  let ahTargetItem = null;

  ahModal.querySelector('.modal-close').addEventListener('click', () => ahModal.classList.remove('open'));
  ahModal.addEventListener('click', e => { if (e.target === ahModal) ahModal.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') ahModal.classList.remove('open'); });

  function setAHResults(html) {
    ahPickerBody.innerHTML = html;
  }

  function renderAHProducts(products) {
    setAHResults(`<div class="ah-product-list">${products.map((p, i) =>
      `<div class="ah-product-item" data-idx="${i}">
        ${p.imageUrl
          ? `<img class="ah-product-thumb" src="${escHtml(p.imageUrl)}" alt="" loading="lazy">`
          : `<div class="ah-product-thumb-placeholder"></div>`}
        <div class="ah-product-info">
          <div class="ah-product-title">${escHtml(p.title)}</div>
          <div class="ah-product-size">${escHtml(p.salesUnitSize)}${p.unitPriceDesc ? ' · ' + escHtml(p.unitPriceDesc) : ''}</div>
        </div>
        <div class="ah-product-price">€${p.price.toFixed(2)}</div>
      </div>`
    ).join('')}</div>`);

    ahPickerBody.querySelectorAll('.ah-product-item').forEach(el => {
      const p = products[parseInt(el.dataset.idx, 10)];
      el.addEventListener('click', async () => {
        ahModal.classList.remove('open');
        try {
          const name = ahTargetItem?.name || '';
          await api.updatePantryItem(ahTargetId, {
            name,
            price:           p.price,
            price_unit_size: p.salesUnitSize,
          });
          await loadItems();
          showToast(`Price set: €${p.price.toFixed(2)} / ${p.salesUnitSize}`);
        } catch (e) {
          showToast('Failed to set price: ' + e.message, true);
        }
      });
    });
  }

  async function runAHSearch(q) {
    if (!q) return;
    setAHResults(`<div class="ah-picker-loading"><div class="spinner"></div> Searching AH…</div>`);
    try {
      const data = await api.searchAH(q);
      const products = data.products || [];
      if (products.length === 0) {
        setAHResults(`<p style="padding:1.5rem;color:var(--muted);text-align:center;font-size:.9rem">No results found on AH.</p>`);
      } else {
        renderAHProducts(products);
      }
    } catch (e) {
      setAHResults(`<p style="padding:1.5rem;color:#dc2626;text-align:center;font-size:.9rem">${escHtml(e.message)}</p>`);
    }
  }

  ahSearchBtn.addEventListener('click', () => runAHSearch(ahSearchInput.value.trim()));
  ahSearchInput.addEventListener('keydown', e => { if (e.key === 'Enter') runAHSearch(ahSearchInput.value.trim()); });

  async function openAHPicker(itemId, itemName) {
    ahTargetId   = itemId;
    ahTargetItem = items.find(it => it.id === itemId);
    ahPickerName.textContent = itemName;
    ahSearchInput.value = itemName;
    ahModal.classList.add('open');
    ahSearchInput.select();
    await runAHSearch(itemName);
  }

  // ── Price Refresh ─────────────────────────────────────────────────────────

  const priceRefreshModal  = document.getElementById('price-refresh-modal');
  const priceRefreshBody   = document.getElementById('price-refresh-body');
  const priceRefreshFooter = document.getElementById('price-refresh-footer');
  const priceRefreshApply  = document.getElementById('price-refresh-apply');
  const priceRefreshCancel = document.getElementById('price-refresh-cancel');

  document.getElementById('price-refresh-close').addEventListener('click', () => priceRefreshModal.classList.remove('open'));
  priceRefreshModal.addEventListener('click', e => { if (e.target === priceRefreshModal) priceRefreshModal.classList.remove('open'); });
  priceRefreshCancel.addEventListener('click', () => priceRefreshModal.classList.remove('open'));

  let _refreshResults = [];

  function formatPrice(item) {
    if (!item || item.price <= 0) return '—';
    return `€${item.price.toFixed(2)} / ${escHtml(item.price_unit_size || '?')}`;
  }

  function renderRefreshResults(results) {
    _refreshResults = results;

    const ul = document.createElement('ul');
    ul.style.cssText = 'list-style:none;padding:0;margin:0;max-height:460px;overflow-y:auto';

    results.forEach((r, i) => {
      const li = document.createElement('li');
      li.style.cssText = 'border-bottom:1px solid var(--border)';

      if (r.status === 'notfound' || r.status === 'error') {
        li.style.opacity = '.55';
        li.innerHTML = `<div style="display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem">
          <input type="checkbox" disabled style="flex-shrink:0">
          <span style="flex:1;font-size:.9rem;font-weight:500">${escHtml(r.item.name)}</span>
          ${r.status === 'error'
            ? `<span style="font-size:.82rem;color:#dc2626">Error</span>`
            : `<span style="font-size:.82rem;color:var(--muted)">— No match found —</span>
               <button class="btn btn-ghost btn-sm search-↗-btn" style="font-size:.78rem;white-space:nowrap">Search ↗</button>`}
        </div>`;
        if (r.status === 'notfound') {
          li.querySelector('.search-↗-btn').addEventListener('click', () => {
            priceRefreshModal.classList.remove('open');
            openAHPicker(r.item.id, r.item.name);
          });
        }
        ul.appendChild(li);
        return;
      }

      // ── found row ──
      const cur = formatPrice(r.item);

      function productLabel(p) {
        return `€${p.price.toFixed(2)} / ${p.salesUnitSize}`;
      }

      function isChanged() {
        return r.best.price !== r.item.price || r.best.salesUnitSize !== r.item.price_unit_size;
      }

      // Main row
      const mainRow = document.createElement('div');
      mainRow.style.cssText = 'display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'refresh-cb';
      cb.dataset.idx = i;
      cb.checked = true;
      cb.style.flexShrink = '0';

      const nameSpan = document.createElement('span');
      nameSpan.style.cssText = 'flex:1;font-size:.9rem;font-weight:500;min-width:80px';
      nameSpan.textContent = r.item.name;

      const curSpan = document.createElement('span');
      curSpan.style.cssText = 'font-size:.82rem;color:var(--muted);white-space:nowrap';
      curSpan.textContent = cur;

      const arrow = document.createElement('span');
      arrow.style.cssText = 'font-size:.82rem;color:var(--muted)';
      arrow.textContent = '→';

      const selectedProduct = document.createElement('div');
      selectedProduct.style.cssText = 'display:flex;align-items:center;gap:.4rem;min-width:0';

      function renderSelectedProduct() {
        const p = r.best;
        const changed = isChanged();
        selectedProduct.innerHTML = '';
        if (p.imageUrl) {
          const img = document.createElement('img');
          img.src = p.imageUrl;
          img.style.cssText = 'width:28px;height:28px;object-fit:contain;border-radius:3px;flex-shrink:0;background:#f5f5f5';
          img.loading = 'lazy';
          selectedProduct.appendChild(img);
        }
        const info = document.createElement('div');
        info.style.cssText = 'min-width:0';
        const titleEl = document.createElement('div');
        titleEl.style.cssText = 'font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px';
        titleEl.textContent = p.title;
        const priceEl = document.createElement('div');
        priceEl.style.cssText = `font-size:.82rem;font-weight:600;white-space:nowrap;${changed ? 'color:var(--brand)' : 'color:var(--muted)'}`;
        priceEl.textContent = productLabel(p);
        info.appendChild(titleEl);
        info.appendChild(priceEl);
        selectedProduct.appendChild(info);
      }
      renderSelectedProduct();

      const changeBtn = document.createElement('button');
      changeBtn.className = 'btn btn-ghost btn-sm';
      changeBtn.style.cssText = 'font-size:.78rem;white-space:nowrap;flex-shrink:0';
      changeBtn.textContent = '▾ Change';

      mainRow.appendChild(cb);
      mainRow.appendChild(nameSpan);
      mainRow.appendChild(curSpan);
      mainRow.appendChild(arrow);
      mainRow.appendChild(selectedProduct);
      mainRow.appendChild(changeBtn);

      // Picker sub-row (hidden by default)
      const pickerRow = document.createElement('div');
      pickerRow.style.cssText = 'display:none;flex-direction:column;gap:0;border-top:1px solid var(--border);background:var(--hover-bg, #f9f9f9)';

      r.products.forEach(p => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:.6rem;padding:.4rem .75rem .4rem 2.4rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s';
        row.addEventListener('mouseenter', () => row.style.background = 'var(--hover-bg)');
        row.addEventListener('mouseleave', () => row.style.background = '');

        if (p.imageUrl) {
          const img = document.createElement('img');
          img.src = p.imageUrl;
          img.style.cssText = 'width:32px;height:32px;object-fit:contain;border-radius:3px;flex-shrink:0;background:#f5f5f5';
          img.loading = 'lazy';
          row.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.style.cssText = 'width:32px;height:32px;flex-shrink:0;background:var(--border);border-radius:3px';
          row.appendChild(ph);
        }

        const info = document.createElement('div');
        info.style.cssText = 'flex:1;min-width:0';
        const titleEl = document.createElement('div');
        titleEl.style.cssText = 'font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
        titleEl.textContent = p.title;
        const sizeEl = document.createElement('div');
        sizeEl.style.cssText = 'font-size:.78rem;color:var(--muted)';
        sizeEl.textContent = p.salesUnitSize + (p.unitPriceDesc ? ' · ' + p.unitPriceDesc : '');
        info.appendChild(titleEl);
        info.appendChild(sizeEl);

        const priceEl = document.createElement('div');
        priceEl.style.cssText = 'font-size:.9rem;font-weight:600;color:var(--brand);white-space:nowrap';
        priceEl.textContent = `€${p.price.toFixed(2)}`;

        const tickEl = document.createElement('div');
        tickEl.style.cssText = 'font-size:.9rem;width:1rem;text-align:center;flex-shrink:0';

        function refreshTick() {
          tickEl.textContent = r.best === p ? '✓' : '';
        }
        refreshTick();

        tickEl.dataset.tick = '1';
        row.appendChild(info);
        row.appendChild(priceEl);
        row.appendChild(tickEl);

        row.addEventListener('click', () => {
          r.best = p;
          renderSelectedProduct();
          pickerRow.querySelectorAll('[data-tick]').forEach(el => el.textContent = '');
          tickEl.textContent = '✓';
          pickerRow.style.display = 'none';
          changeBtn.textContent = '▾ Change';
        });

        pickerRow.appendChild(row);
      });

      changeBtn.addEventListener('click', () => {
        const open = pickerRow.style.display !== 'none';
        pickerRow.style.display = open ? 'none' : 'flex';
        pickerRow.style.flexDirection = 'column';
        changeBtn.textContent = open ? '▾ Change' : '▴ Close';
      });

      li.appendChild(mainRow);
      li.appendChild(pickerRow);
      ul.appendChild(li);
    });

    priceRefreshBody.innerHTML = '';
    priceRefreshBody.appendChild(ul);
    priceRefreshFooter.style.display = 'flex';
  }

  async function openPriceRefresh(subset) {
    const target = subset || items;
    if (target.length === 0) { showToast('No items to price'); return; }

    _refreshResults = [];
    priceRefreshFooter.style.display = 'none';
    priceRefreshBody.innerHTML = `<div style="padding:1.5rem;display:flex;flex-direction:column;gap:1rem">
      <div id="refresh-progress-text" style="font-size:.9rem;color:var(--muted)">Preparing…</div>
      <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">
        <div id="refresh-progress-bar" style="height:100%;background:var(--brand);width:0%;transition:width .2s"></div>
      </div>
    </div>`;
    priceRefreshModal.classList.add('open');

    const results = [];
    for (let i = 0; i < target.length; i++) {
      const item = target[i];
      const pct  = Math.round((i / target.length) * 100);
      const progressText = document.getElementById('refresh-progress-text');
      const progressBar  = document.getElementById('refresh-progress-bar');
      if (progressText) progressText.textContent = `Searching ${i + 1} / ${target.length}: ${item.name}`;
      if (progressBar)  progressBar.style.width  = pct + '%';

      try {
        const data     = await api.searchAH(item.name);
        const products = data.products || [];
        results.push(products.length
          ? { item, products, best: products[0], status: 'found' }
          : { item, products: [], best: null, status: 'notfound' });
      } catch (_) {
        results.push({ item, products: [], best: null, status: 'error' });
      }
    }

    renderRefreshResults(results);
  }

  priceRefreshApply.addEventListener('click', async () => {
    const toUpdate = [];
    priceRefreshBody.querySelectorAll('.refresh-cb:checked').forEach(cb => {
      const r = _refreshResults[parseInt(cb.dataset.idx, 10)];
      if (r && r.status === 'found') toUpdate.push(r);
    });

    if (toUpdate.length === 0) { showToast('Nothing selected'); return; }

    priceRefreshApply.disabled = true;
    try {
      for (const r of toUpdate) {
        await api.updatePantryItem(r.item.id, {
          name:           r.item.name,
          price:          r.best.price,
          price_unit_size: r.best.salesUnitSize,
        });
      }
      await loadItems();
      priceRefreshModal.classList.remove('open');
      showToast(`Updated ${toUpdate.length} item${toUpdate.length === 1 ? '' : 's'}`);
    } catch (e) {
      showToast('Update failed: ' + e.message, true);
    } finally {
      priceRefreshApply.disabled = false;
    }
  });

  document.getElementById('refresh-prices-btn').addEventListener('click', () => openPriceRefresh());
  document.getElementById('refresh-unpriced-btn').addEventListener('click', () => {
    const unpriced = items.filter(it => !(it.price > 0));
    openPriceRefresh(unpriced);
  });

  // ── Init ─────────────────────────────────────────────────────────────────

  await loadItems();
})();
</script>
</body>
</html>
