<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Recipe — KitchenAid</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/theme.js"></script>
  <style>
    .add-container { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem; }
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius)*1.5);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .section-card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; }
    .dynamic-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.75rem; }
    .dynamic-row {
      display: grid;
      gap: 0.5rem;
      align-items: center;
    }
    .ing-row  { grid-template-columns: 3fr 1fr 1fr 1.5fr auto auto; }
    .pantry-btn {
      background: none; border: none; cursor: pointer; color: var(--brand);
      font-size: 1rem; padding: 0.2rem 0.4rem; border-radius: 4px;
      white-space: nowrap;
    }
    .pantry-btn:hover { background: var(--hover-soft); }
    .step-row { grid-template-columns: auto 1fr auto; }
    .step-num {
      width: 2rem; height: 2rem;
      background: var(--brand); color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; flex-shrink: 0;
    }
    .remove-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 1rem; padding: 0.2rem 0.4rem; border-radius: 4px;
    }
    .remove-btn:hover { color: #dc2626; background: #fee2e2; }
    .add-row-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: none; border: 1px dashed var(--border);
      color: var(--brand); font-size: .85rem; font-weight: 500;
      padding: .4rem .75rem; border-radius: var(--radius); cursor: pointer;
    }
    .add-row-btn:hover { background: var(--hover-soft); }
    .add-row-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .image-preview { max-width: 100%; max-height: 200px; border-radius: var(--radius); display: none; margin-top: .75rem; }
    .form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; padding-top: 0.5rem; }
    @media (max-width: 600px) {
      .ing-row { grid-template-columns: 1fr 1fr auto auto; }
      .ing-row > *:first-child { grid-column: 1/-1; }
      .ing-row > *:nth-child(4) { grid-column: 1/-1; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">Kitchen<span>Aid</span></a>
    <nav class="header-nav">
      <a href="/pantry.html" class="btn btn-secondary btn-icon" title="Pantry"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg></a>
      <label class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode"><input type="checkbox" id="theme-toggle-btn"><span class="theme-toggle-track"><svg class="toggle-icon toggle-sun" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="2.5" fill="currentColor"/><path d="M8 1.5V3M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M12.6 3.4l-1.1 1.1M4.5 11.5l-1.1 1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span class="theme-toggle-thumb"></span><svg class="toggle-icon toggle-moon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 10A5.5 5.5 0 0 1 6 2.5a.49.49 0 0 0-.6-.65A6 6 0 1 0 14.15 10.5a.49.49 0 0 0-.65-.5z" fill="currentColor"/></svg></span></label>
    </nav>
  </div>
</header>

<main class="add-container">
  <a href="/" class="back-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back</a>
  <h1 class="page-title" id="page-title" style="margin-bottom:1.5rem">Add Recipe</h1>

  <form id="recipe-form" novalidate>

    <!-- Basic info -->
    <div class="section-card">
      <h2>Basic Info</h2>
      <div class="form-group">
        <label class="form-label" for="title">Title *</label>
        <input type="text" id="title" name="title" class="form-input" placeholder="Chocolate chip cookies" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <textarea id="description" name="description" class="form-textarea" placeholder="A brief description of the recipe…" rows="2"></textarea>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label" for="prep_time">Prep time (min)</label>
          <input type="number" id="prep_time" name="prep_time" class="form-input" min="0" placeholder="15">
        </div>
        <div class="form-group">
          <label class="form-label" for="cook_time">Cook time (min)</label>
          <input type="number" id="cook_time" name="cook_time" class="form-input" min="0" placeholder="30">
        </div>
        <div class="form-group">
          <label class="form-label" for="base_servings">Servings</label>
          <input type="number" id="base_servings" name="base_servings" class="form-input" min="1" placeholder="4">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="source_url">Source URL</label>
        <input type="url" id="source_url" name="source_url" class="form-input" placeholder="https://…">
      </div>
    </div>

    <!-- Photo -->
    <div class="section-card">
      <h2>Photo</h2>
      <div class="form-group">
        <label class="form-label" for="image_url">Image URL</label>
        <input type="text" id="image_url" name="image_url" class="form-input" placeholder="https://… or upload below">
      </div>
      <div class="form-group">
        <label class="form-label" for="image_file">Upload Image</label>
        <input type="file" id="image_file" accept="image/jpeg,image/png,image/webp" class="form-input" style="padding:.4rem">
      </div>
      <img id="image-preview" class="image-preview" alt="Preview">
    </div>

    <!-- Ingredients -->
    <div class="section-card">
      <h2>Ingredients <span style="color:var(--muted);font-weight:400;font-size:.8rem">(store amounts in metric)</span></h2>
      <div class="dynamic-list" id="ingredients-list"></div>
      <div class="add-row-actions">
        <button type="button" class="add-row-btn" id="add-ingredient"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Ingredient</button>
        <button type="button" class="add-row-btn" id="add-from-pantry"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg> From Pantry</button>
      </div>
    </div>

    <!-- Steps -->
    <div class="section-card">
      <h2>Steps</h2>
      <div class="dynamic-list" id="steps-list"></div>
      <button type="button" class="add-row-btn" id="add-step"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Step</button>
    </div>

    <div class="form-actions">
      <a href="/" class="btn btn-secondary">Cancel</a>
      <button type="submit" id="submit-btn" class="btn btn-primary">Save Recipe</button>
    </div>

  </form>
</main>

<!-- Pantry picker modal -->
<div id="pantry-picker-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Add from Pantry</h2>
      <button class="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="pantry-picker-search">
      <input type="search" id="pantry-picker-search" class="form-input" placeholder="Search pantry…" autocomplete="off">
    </div>
    <ul id="pantry-picker-list" class="pantry-picker-list"></ul>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary modal-close">Cancel</button>
      <button id="pantry-picker-confirm" class="btn btn-primary" disabled>Add 0 items</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/unit-list.js"></script>
<script>
(async () => {
  const isImport = new URLSearchParams(location.search).get('source') === 'import';
  let importData = null;

  if (isImport) {
    const raw = sessionStorage.getItem('kitchenaid_import');
    if (raw) {
      importData = JSON.parse(raw);
      sessionStorage.removeItem('kitchenaid_import');
      document.getElementById('page-title').textContent = 'Review Imported Recipe';
    }
  }

  // ── Load pantry items for autocomplete + auto-fill ───────────────────────

  let pantryItems = [];
  try {
    pantryItems = await api.listPantryItems();
  } catch (_) {}

  const datalistId = 'pantry-names-list';
  const dl = document.createElement('datalist');
  dl.id = datalistId;
  pantryItems.forEach(it => {
    const opt = document.createElement('option');
    opt.value = it.name;
    dl.appendChild(opt);
  });
  document.body.appendChild(dl);

  // ── Ingredient rows ──────────────────────────────────────────────────────

  const ingList = document.getElementById('ingredients-list');
  let ingCount = 0;

  function addIngredientRow(data = {}) {
    const i = ingCount++;
    const row = document.createElement('div');
    row.className = 'dynamic-row ing-row';
    row.innerHTML = `
      <input type="text" class="form-input" name="ing_name_${i}" placeholder="Ingredient name" list="${datalistId}" value="${escVal(data.name||'')}">
      <input type="number" class="form-input" name="ing_amount_${i}" placeholder="Amount" step="any" min="0" value="${data.amount||''}">
      <select class="form-select" name="ing_unit_${i}"></select>
      <input type="text" class="form-input" name="ing_notes_${i}" placeholder="Notes (optional)" value="${escVal(data.notes||'')}">
      <button type="button" class="pantry-btn" title="Save to Pantry"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg></button>
      <button type="button" class="remove-btn" onclick="this.parentElement.remove()" title="Remove"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    const nameInput   = row.querySelector('[name^=ing_name]');
    const amountInput = row.querySelector('[name^=ing_amount]');
    const unitSelect  = row.querySelector('[name^=ing_unit]');
    const notesInput  = row.querySelector('[name^=ing_notes]');
    unitList.populateSelect(unitSelect, data.unit || '');

    // Auto-fill from pantry when a known name is chosen
    nameInput.addEventListener('change', () => {
      const match = pantryItems.find(it => it.name.toLowerCase() === nameInput.value.trim().toLowerCase());
      if (!match) return;
      if (match.amount)  amountInput.value = match.amount;
      if (match.unit)    unitSelect.value  = match.unit;
      if (match.notes)   notesInput.value  = match.notes;
    });

    const pantryBtn = row.querySelector('.pantry-btn');
    pantryBtn.addEventListener('click', async () => {
      const name   = nameInput.value.trim();
      if (!name) { showToast('Enter a name first', true); return; }
      const amount = parseFloat(amountInput.value) || 0;
      const unit   = unitSelect.value;
      const notes  = notesInput.value.trim();
      try {
        await api.createPantryItem({ name, amount, unit, notes });
        showToast(`"${name}" saved to pantry`);
        if (!pantryItems.find(it => it.name === name)) {
          pantryItems.push({ name, amount, unit, notes });
          const opt = document.createElement('option');
          opt.value = name;
          dl.appendChild(opt);
        }
      } catch (e) {
        showToast('Pantry save failed: ' + e.message, true);
      }
    });
    ingList.appendChild(row);
  }

  document.getElementById('add-ingredient').addEventListener('click', () => addIngredientRow());

  // ── Pantry picker ─────────────────────────────────────────────────────────

  const pickerModal   = document.getElementById('pantry-picker-modal');
  const pickerList    = document.getElementById('pantry-picker-list');
  const pickerSearch  = document.getElementById('pantry-picker-search');
  const pickerConfirm = document.getElementById('pantry-picker-confirm');

  function renderPickerList(query = '') {
    const q = query.toLowerCase();
    const filtered = pantryItems.filter(it =>
      it.name.toLowerCase().includes(q) || (it.notes || '').toLowerCase().includes(q)
    );

    if (filtered.length === 0) {
      pickerList.innerHTML = `<li class="pantry-picker-empty">${pantryItems.length === 0 ? 'Your pantry is empty.' : 'No results.'}</li>`;
      return;
    }

    pickerList.innerHTML = '';
    filtered.forEach(item => {
      const li = document.createElement('li');
      li.className = 'pantry-picker-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.dataset.name = item.name;
      cb.addEventListener('change', updatePickerBtn);

      const nameEl = document.createElement('span');
      nameEl.className = 'pantry-picker-item-name';
      nameEl.textContent = item.name;

      li.appendChild(cb);
      li.appendChild(nameEl);

      const detail = [item.amount ? item.amount : null, item.unit || null].filter(Boolean).join(' ');
      if (detail) {
        const detailEl = document.createElement('span');
        detailEl.className = 'pantry-picker-item-detail';
        detailEl.textContent = detail;
        li.appendChild(detailEl);
      }

      li.addEventListener('click', e => {
        if (e.target !== cb) { cb.checked = !cb.checked; updatePickerBtn(); }
      });

      pickerList.appendChild(li);
    });
  }

  function updatePickerBtn() {
    const n = pickerList.querySelectorAll('input:checked').length;
    pickerConfirm.textContent = `Add ${n} item${n === 1 ? '' : 's'}`;
    pickerConfirm.disabled = n === 0;
  }

  document.getElementById('add-from-pantry').addEventListener('click', () => {
    if (pantryItems.length === 0) { showToast('Pantry is empty'); return; }
    pickerSearch.value = '';
    renderPickerList();
    updatePickerBtn();
    pickerModal.classList.add('open');
    pickerSearch.focus();
  });

  pickerSearch.addEventListener('input', e => renderPickerList(e.target.value));

  pickerConfirm.addEventListener('click', () => {
    pickerList.querySelectorAll('input:checked').forEach(cb => {
      const item = pantryItems.find(it => it.name === cb.dataset.name);
      if (item) addIngredientRow(item);
    });
    pickerModal.classList.remove('open');
  });

  pickerModal.querySelectorAll('.modal-close').forEach(btn =>
    btn.addEventListener('click', () => pickerModal.classList.remove('open')));
  pickerModal.addEventListener('click', e => {
    if (e.target === pickerModal) pickerModal.classList.remove('open');
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && pickerModal.classList.contains('open'))
      pickerModal.classList.remove('open');
  });

  // ── Step rows ─────────────────────────────────────────────────────────────

  const stepList = document.getElementById('steps-list');
  let stepCount = 0;

  function addStepRow(data = {}) {
    const i = stepCount++;
    const num = stepList.querySelectorAll('.dynamic-row').length + 1;
    const row = document.createElement('div');
    row.className = 'dynamic-row step-row';
    row.innerHTML = `
      <div class="step-num">${num}</div>
      <textarea class="form-textarea" name="step_instruction_${i}" placeholder="Describe this step…" rows="2">${escVal(data.instruction||'')}</textarea>
      <button type="button" class="remove-btn" onclick="this.parentElement.remove(); renumberSteps()" title="Remove"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    stepList.appendChild(row);
  }

  window.renumberSteps = () => {
    stepList.querySelectorAll('.step-num').forEach((el, idx) => { el.textContent = idx + 1; });
  };

  document.getElementById('add-step').addEventListener('click', () => addStepRow());

  // ── Image upload preview ──────────────────────────────────────────────────

  const fileInput   = document.getElementById('image_file');
  const imageUrlIn  = document.getElementById('image_url');
  const preview     = document.getElementById('image-preview');

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  });

  imageUrlIn.addEventListener('input', () => {
    if (imageUrlIn.value) {
      preview.src = imageUrlIn.value;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  });

  // ── Pre-fill from import ──────────────────────────────────────────────────

  if (importData) {
    document.getElementById('title').value         = importData.title         || '';
    document.getElementById('description').value   = importData.description   || '';
    document.getElementById('prep_time').value     = importData.prep_time     || '';
    document.getElementById('cook_time').value     = importData.cook_time     || '';
    document.getElementById('base_servings').value = importData.base_servings || 4;
    document.getElementById('source_url').value    = importData.source_url    || '';
    document.getElementById('image_url').value     = importData.image_url     || '';
    if (importData.image_url) {
      preview.src = importData.image_url;
      preview.style.display = 'block';
    }
    (importData.ingredients || []).forEach(ing => addIngredientRow(ing));
    (importData.steps       || []).forEach(s   => addStepRow(s));
  } else {
    // Start with 1 empty row each
    addIngredientRow();
    addStepRow();
  }

  // ── Submit ────────────────────────────────────────────────────────────────

  document.getElementById('recipe-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      // Upload image if file selected
      let imageURL = imageUrlIn.value.trim();
      const file = fileInput.files[0];
      if (file) {
        const uploaded = await api.upload(file);
        imageURL = uploaded.url;
      }

      // Collect ingredients
      const ingredients = [];
      ingList.querySelectorAll('.dynamic-row').forEach((row, idx) => {
        const name = row.querySelector('[name^=ing_name]')?.value.trim();
        if (!name) return;
        ingredients.push({
          name,
          amount: parseFloat(row.querySelector('[name^=ing_amount]')?.value) || 0,
          unit:   row.querySelector('[name^=ing_unit]')?.value || '',
          notes:  row.querySelector('[name^=ing_notes]')?.value.trim() || '',
          sort_order: idx,
        });
      });

      // Collect steps
      const steps = [];
      stepList.querySelectorAll('.dynamic-row').forEach((row, idx) => {
        const instruction = row.querySelector('textarea')?.value.trim();
        if (!instruction) return;
        steps.push({ step_number: idx + 1, instruction, duration: 0 });
      });

      const data = {
        title:         document.getElementById('title').value.trim(),
        description:   document.getElementById('description').value.trim(),
        prep_time:     parseInt(document.getElementById('prep_time').value)    || 0,
        cook_time:     parseInt(document.getElementById('cook_time').value)    || 0,
        base_servings: parseInt(document.getElementById('base_servings').value)|| 4,
        source_url:    document.getElementById('source_url').value.trim(),
        image_url:     imageURL,
        ingredients,
        steps,
      };

      if (!data.title) { showToast('Title is required', true); btn.disabled = false; btn.textContent = 'Save Recipe'; return; }

      const recipe = await api.createRecipe(data);
      window.location.href = `/recipe.html?id=${recipe.id}`;
    } catch (err) {
      showToast('Save failed: ' + err.message, true);
      btn.disabled = false;
      btn.textContent = 'Save Recipe';
    }
  });

  function escVal(s) {
    return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  function showToast(msg, isError = false) {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast' + (isError ? ' error' : '');
    t.textContent = msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }
})();
</script>
</body>
</html>
