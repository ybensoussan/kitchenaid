<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner — KitchenAid</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/theme.js"></script>
  <style>
    .planner-container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Week selector row */
    .week-selector {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .week-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      min-width: 11rem;
      text-align: center;
    }
    .week-nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      transition: background var(--transition);
    }
    .week-nav-btn:hover { background: var(--hover-bg); }

    .plan-selector-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .plan-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.4rem 0.75rem;
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      min-width: 12rem;
    }

    /* Weekly grid */
    .planner-grid-wrapper {
      margin-bottom: 0;
    }
    .planner-grid {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius)*1.5);
      overflow: hidden;
    }
    .grid-row {
      display: flex;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
    }
    .grid-row:last-child { border-bottom: none; }
    .grid-row-label {
      width: 80px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 0.75rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 0.1rem;
    }
    .grid-row-label-day {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .grid-row-label-date {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
    }
    .grid-row.today-row .grid-row-label-day,
    .grid-row.today-row .grid-row-label-date { color: var(--brand); }
    .grid-cell {
      flex: 1;
      padding: 0.5rem 0.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: flex-start;
      background: var(--bg);
      transition: background var(--transition);
    }
    .grid-row.today-row .grid-cell { background: color-mix(in srgb, var(--brand) 4%, var(--bg)); }

    .recipe-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 0.75);
      padding: 0.25rem 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background var(--transition);
      position: relative;
    }
    .recipe-chip:hover { background: var(--hover-bg); }
    .recipe-chip-img {
      width: 28px;
      height: 28px;
      border-radius: calc(var(--radius) * 0.5);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--hover-bg);
    }
    .recipe-chip-img-placeholder {
      width: 28px;
      height: 28px;
      border-radius: calc(var(--radius) * 0.5);
      background: var(--hover-bg);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.65rem;
    }
    .recipe-chip-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-weight: 500;
    }
    .recipe-chip-remove {
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      font-size: 0.9rem;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.12s;
    }
    .recipe-chip:hover .recipe-chip-remove { opacity: 1; }

    .grid-cell-empty {
      cursor: pointer;
    }
    .grid-cell-empty:hover {
      background: color-mix(in srgb, var(--brand) 6%, var(--bg));
    }
    .cell-empty-hint {
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.15s;
      user-select: none;
    }
    .grid-cell-empty:hover .cell-empty-hint { opacity: 1; }
    .grid-cell-filled { cursor: pointer; }

    /* Side-by-side layout */
    .planner-main-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }
    .planner-grid-wrapper {
      flex: 1;
      min-width: 0;
    }
    .grocery-section {
      flex: 1;
      min-width: 0;
      position: sticky;
      top: 1rem;
    }
    @media (max-width: 700px) {
      .planner-main-layout { flex-direction: column; }
      .grocery-section { position: static; width: 100%; }
    }

    /* Grocery list section */
    .grocery-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius)*1.5);
      padding: 1.25rem;
    }
    .grocery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .grocery-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .grocery-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .unit-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .unit-toggle-btn {
      background: var(--bg);
      border: none;
      padding: 0.25rem 0.55rem;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--muted);
      transition: background var(--transition), color var(--transition);
    }
    .unit-toggle-btn + .unit-toggle-btn { border-left: 1px solid var(--border); }
    .unit-toggle-btn.active { background: var(--brand); color: #fff; }
    .grocery-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .grocery-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      position: relative;
    }
    .grocery-item:last-child { border-bottom: none; }
    .grocery-item-name { font-weight: 600; flex: 1; min-width: 0; }
    .grocery-item-amount { color: var(--muted); font-size: 0.85rem; flex-shrink: 0; }
    .grocery-amount-ctrl {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }
    .grocery-amt-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 0.5);
      width: 1.5rem;
      height: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      color: var(--text);
      transition: background var(--transition), border-color var(--transition);
      flex-shrink: 0;
    }
    .grocery-amt-btn:hover { background: var(--hover-bg); border-color: var(--brand); color: var(--brand); }
    .grocery-amt-display {
      font-size: 0.85rem;
      color: var(--muted);
      min-width: 3rem;
      text-align: center;
    }
    .grocery-item-recipes {
      position: absolute;
      bottom: calc(100% + 4px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 0.75);
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .grocery-item:hover .grocery-item-recipes { opacity: 1; }
    .grocery-pantry-btn {
      width: 1.35rem;
      height: 1.35rem;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: none;
      color: transparent;
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }
    .grocery-item:hover .grocery-pantry-btn { border-color: var(--brand); color: var(--border); }
    .grocery-pantry-btn.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .grocery-item.in-pantry .grocery-item-name,
    .grocery-item.in-pantry .grocery-item-amount { text-decoration: line-through; opacity: 0.45; }
    .grocery-item.in-pantry .grocery-item-amount { opacity: 0.45; }
    .grocery-empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 1rem 0; }
    .grocery-add-row {
      display: flex;
      gap: 0.35rem;
      padding: 0.6rem 0 0.2rem;
      border-top: 1px solid var(--border);
      margin-top: 0.25rem;
      align-items: center;
    }
    .grocery-add-name {
      flex: 1;
      min-width: 0;
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
    }
    .grocery-add-name:focus { outline: none; border-color: var(--brand); }
    .grocery-add-amount {
      width: 3.5rem;
      padding: 0.25rem 0.4rem;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      text-align: right;
    }
    .grocery-add-amount:focus { outline: none; border-color: var(--brand); }
    .grocery-add-unit {
      width: 3rem;
      padding: 0.25rem 0.4rem;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
    }
    .grocery-add-unit:focus { outline: none; border-color: var(--brand); }
    .grocery-add-btn {
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 50%;
      border: none;
      background: var(--brand);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity var(--transition);
    }
    .grocery-add-btn:hover { opacity: 0.85; }

    /* Empty / no-plan state */
    .no-plan-state {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }
    .no-plan-state p { margin-bottom: 1rem; }

    /* Recipe Picker Modal */
    .picker-search {
      width: 100%;
      padding: 0.55rem 0.75rem;
      font-size: 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    .picker-search:focus { outline: none; border-color: var(--brand); }
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.65rem;
      max-height: 380px;
      overflow-y: auto;
    }
    .picker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .picker-card:hover { border-color: var(--brand); box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand) 25%, transparent); }
    .picker-card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--hover-bg);
      display: block;
    }
    .picker-card-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--hover-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .picker-card-title {
      padding: 0.4rem 0.5rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* Chip multiplier buttons (inline in the planner grid) */
    .chip-mult-btns {
      display: flex;
      gap: 0.15rem;
      flex-shrink: 0;
    }
    .chip-mult-btn {
      padding: 0.06rem 0.28rem;
      font-size: 0.6rem;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 0.5);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
      line-height: 1.4;
      flex-shrink: 0;
    }
    .chip-mult-btn.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }
    .chip-mult-btn:hover:not(.active) { border-color: var(--brand); color: var(--brand); }
    .picker-empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 2rem; }

    /* New Plan modal */
    .new-plan-form { display: flex; flex-direction: column; gap: 1rem; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">Kitchen<span>Aid</span></a>
    <nav class="header-nav">
      <a href="/pantry.html" class="btn btn-secondary btn-icon" title="Pantry"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg></a>
      <a href="/planner.html" class="btn btn-secondary btn-icon active" title="Planner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></a>
      <a href="/settings.html" class="btn btn-secondary btn-icon" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
      <label class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode"><input type="checkbox" id="theme-toggle-btn"><span class="theme-toggle-track"><svg class="toggle-icon toggle-sun" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="2.5" fill="currentColor"/><path d="M8 1.5V3M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M12.6 3.4l-1.1 1.1M4.5 11.5l-1.1 1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span class="theme-toggle-thumb"></span><svg class="toggle-icon toggle-moon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 10A5.5 5.5 0 0 1 6 2.5a.49.49 0 0 0-.6-.65A6 6 0 1 0 14.15 10.5a.49.49 0 0 0-.65-.5z" fill="currentColor"/></svg></span></label>
    </nav>
  </div>
</header>

<main class="page-container">
  <div class="planner-container">

    <div class="page-header" style="margin-bottom:1.25rem;">
      <h1 class="page-title">Meal Planner</h1>
    </div>

    <!-- Week selector -->
    <div class="week-selector">
      <button class="week-nav-btn" id="prev-week-btn" title="Previous week">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="week-label" id="week-label">Week of …</span>
      <button class="week-nav-btn" id="next-week-btn" title="Next week">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="btn btn-primary" id="new-plan-btn" style="margin-left:auto;">+ New Plan</button>
    </div>

    <!-- Plan selector -->
    <div class="plan-selector-row" id="plan-selector-row" style="display:none;">
      <label for="plan-select" style="font-size:0.85rem;color:var(--muted);font-weight:500;">Plan:</label>
      <select class="plan-select" id="plan-select"></select>
      <button class="btn btn-secondary" id="delete-plan-btn" title="Delete this plan" style="color:var(--danger,#e53e3e);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Delete Plan
      </button>
    </div>

    <!-- Main content area -->
    <div id="planner-content">
      <div class="no-plan-state" id="no-plan-state">
        <p>No meal plan for this week yet.</p>
        <button class="btn btn-primary" id="no-plan-create-btn">+ Create Plan for This Week</button>
      </div>
    </div>

  </div>
</main>

<!-- New Plan Modal -->
<div id="new-plan-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">New Meal Plan</h2>
      <button class="modal-close" aria-label="Close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="new-plan-form" style="padding:1.25rem 1.5rem;">
      <div class="form-group" style="margin:0;">
        <label class="form-label" for="new-plan-name">Plan name</label>
        <input type="text" id="new-plan-name" class="form-input" placeholder="e.g. Week of March 17">
      </div>
      <div class="form-group" style="margin:0;">
        <label class="form-label" for="new-plan-week">Week start (Monday)</label>
        <input type="date" id="new-plan-week" class="form-input">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary modal-close">Cancel</button>
      <button class="btn btn-primary" id="new-plan-confirm-btn">Create Plan</button>
    </div>
  </div>
</div>

<!-- Recipe Picker Modal -->
<div id="picker-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <h2 class="modal-title" id="picker-modal-title">Add Recipe</h2>
      <button class="modal-close" aria-label="Close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div style="padding:1rem 1.5rem 1.5rem;">
      <input type="search" id="picker-search" class="picker-search" placeholder="Search recipes…" autocomplete="off">
      <div id="picker-grid" class="picker-grid">
        <div class="picker-empty">Loading recipes…</div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/units.js"></script>
<script src="/js/planner.js"></script>
</body>
</html>
