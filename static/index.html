<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitchenAid Recipe Book</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/grid.css">
  <script src="/js/theme.js"></script>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">Kitchen<span>Aid</span></a>
    <nav class="header-nav">
      <a href="/pantry.html" class="btn btn-secondary btn-icon" title="Pantry"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg></a>
      <a href="/planner.html" class="btn btn-secondary btn-icon" title="Planner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></a>
      <div class="dropdown" id="add-recipe-dropdown">
        <button class="btn btn-primary btn-icon" id="add-recipe-btn" title="Add Recipe">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="dropdown-menu">
          <a href="/add.html" class="dropdown-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Create
          </a>
          <button class="dropdown-item" id="import-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            Import
          </button>
        </div>
      </div>
      <a href="/settings.html" class="btn btn-secondary btn-icon" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
      <label class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode"><input type="checkbox" id="theme-toggle-btn"><span class="theme-toggle-track"><svg class="toggle-icon toggle-sun" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="2.5" fill="currentColor"/><path d="M8 1.5V3M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M12.6 3.4l-1.1 1.1M4.5 11.5l-1.1 1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span class="theme-toggle-thumb"></span><svg class="toggle-icon toggle-moon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 10A5.5 5.5 0 0 1 6 2.5a.49.49 0 0 0-.6-.65A6 6 0 1 0 14.15 10.5a.49.49 0 0 0-.65-.5z" fill="currentColor"/></svg></span></label>
    </nav>
  </div>
</header>

<main class="page-container">
  <div class="toolbar" style="flex-direction: column; align-items: stretch; gap: 1rem; margin-top: 0;">
    <div style="display: flex; align-items: center; gap: 1rem;">
      <input type="search" id="search-input" class="search-input" placeholder="Search recipes…" autocomplete="off" style="flex: 1">
      <span id="recipe-count" style="color:var(--muted); font-size: 0.8rem; white-space: nowrap;"></span>
    </div>
    <div id="tag-filters" class="tag-filters" style="display:none"></div>
  </div>

  <div id="recipe-grid" class="recipe-grid">
    <div class="spinner"></div>
  </div>
</main>

<!-- Import URL Modal -->
<div id="import-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Import Recipe</h2>
      <button class="modal-close" aria-label="Close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>

    <div class="import-tab-bar">
      <button id="tab-url" class="import-tab active">URL</button>
      <button id="tab-html" class="import-tab">HTML</button>
      <button id="tab-text" class="import-tab">Text</button>
      <button id="tab-photo" class="import-tab"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg> Photo</button>
      <button id="tab-file" class="import-tab"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Recipe File</button>
    </div>

    <!-- URL mode -->
    <form id="import-form">
      <div id="mode-url">
        <div class="form-group">
          <label class="form-label" for="import-url">Recipe URL</label>
          <input type="url" id="import-url" class="form-input"
                 placeholder="https://www.allrecipes.com/recipe/…">
        </div>
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:.75rem">
          Supports AllRecipes, NYT Cooking, and 30+ other sites.
        </p>
      </div>

      <!-- Paste HTML mode -->
      <div id="mode-html" style="display:none">
        <div class="form-group">
          <label class="form-label" for="import-source-url">Source URL <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
          <input type="url" id="import-source-url" class="form-input" placeholder="https://food52.com/recipes/…">
        </div>
        <div class="form-group">
          <label class="form-label" for="import-html">Page source HTML</label>
          <textarea id="import-html" class="form-textarea" rows="6"
            placeholder="Open the recipe in your browser → right-click → View Page Source (Ctrl+U / Cmd+U) → Select All → paste here"></textarea>
        </div>
      </div>

      <!-- Paste Text mode -->
      <div id="mode-text" style="display:none">
        <div class="form-group">
          <label class="form-label" for="import-text-input">Recipe text</label>
          <textarea id="import-text-input" class="form-textarea recipe-text-input" rows="10"
            placeholder="Paste your recipe here — title, ingredients, steps…"></textarea>
        </div>
        <div class="import-text-actions">
          <button type="button" id="parse-local-btn" class="btn btn-secondary">Parse Locally</button>
          <button type="button" id="parse-ai-btn" class="btn btn-primary">Parse with AI</button>
        </div>
      </div>

      <!-- Photo mode -->
      <div id="mode-photo" style="display:none">
        <label class="photo-dropzone" id="photo-dropzone" for="photo-file-input">
          <img id="photo-preview" hidden>
          <span class="photo-placeholder" id="photo-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            <span>Drop a photo here or <span class="photo-browse-link">browse</span></span>
          </span>
        </label>
        <input type="file" id="photo-file-input" accept="image/*" hidden>
        <button id="photo-parse-btn" class="btn btn-primary" disabled
                style="width:100%;margin-top:.75rem">Parse Recipe</button>
      </div>

      <!-- Recipe File mode -->
      <div id="mode-file" style="display:none">
        <label class="photo-dropzone" id="file-dropzone" for="recipe-file-input">
          <span class="photo-placeholder" id="file-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            <span>Drop a <strong>.kitchenaid.json</strong> file or <span class="photo-browse-link">browse</span></span>
          </span>
        </label>
        <input type="file" id="recipe-file-input" accept=".json,application/json" hidden>
        <p id="file-import-name" class="file-import-name" style="display:none"></p>
        <button id="file-import-btn" class="btn btn-primary" disabled
                style="width:100%;margin-top:.75rem">Review Recipe</button>
      </div>

      <div id="import-spinner" class="spinner" style="display:none;margin:0;width:1.2rem;height:1.2rem"></div>
    </form>
    <div class="modal-footer" id="import-footer-default">
      <button type="button" class="btn btn-secondary modal-close">Cancel</button>
      <button id="import-submit" class="btn btn-primary">Import</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/import.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
