<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — The Editorial Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="/js/theme.js"></script>
  <style>
    :root {
      --primary: #516441;
      --primary-light: #869b74;
      --surface: #faf9f8;
      --surface-lowest: #fff;
      --text: #1a1a18;
      --muted: #7a7870;
      --border: #e0dbd4;
      --font-body: 'Manrope', sans-serif;
      --font-headline: 'Noto Serif', serif;
    }
    [data-theme="dark"] {
      --surface: #1e1e1c; --surface-lowest: #252523;
      --text: #f0ede8; --muted: #9a9790; --border: #333330;
    }
    [data-theme="light"] {
      --surface: #faf9f8; --surface-lowest: #fff;
      --text: #1a1a18; --muted: #7a7870; --border: #e0dbd4;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .login-wrap { width: 100%; max-width: 400px; }
    .login-brand { text-align: center; margin-bottom: 2.5rem; }
    .login-brand-icon {
      width: 3.5rem; height: 3.5rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 1rem;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 8px 24px rgba(81,100,65,0.25);
    }
    .login-brand-icon .material-symbols-outlined { font-size: 1.75rem; color: #fff; }
    .login-brand h1 { font-family: var(--font-headline); font-size: 1.5rem; font-weight: 700; }
    .login-brand p { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 0.25rem; }

    .login-card {
      background: var(--surface-lowest);
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }
    .card-heading {
      font-family: var(--font-headline);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.4rem; }
    .form-input {
      width: 100%; padding: 0.7rem 0.9rem;
      font-family: var(--font-body); font-size: 0.9rem;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 0.75rem; color: var(--text); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(81,100,65,0.12); }
    .form-input::placeholder { color: var(--muted); opacity: 0.6; }

    .btn-primary {
      width: 100%; padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff; border: none; border-radius: 9999px;
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(81,100,65,0.25);
      transition: opacity 0.15s, box-shadow 0.15s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { opacity: 0.92; box-shadow: 0 6px 20px rgba(81,100,65,0.35); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1.5rem 0; color: var(--muted); font-size: 0.8rem; font-weight: 500;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .oauth-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.65rem;
      width: 100%; padding: 0.65rem 1rem;
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 9999px;
      font-family: var(--font-body); font-size: 0.875rem; font-weight: 600;
      color: var(--text); cursor: pointer; text-decoration: none;
      transition: box-shadow 0.15s, border-color 0.15s;
      margin-bottom: 0.6rem;
    }
    .oauth-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: color-mix(in srgb, var(--border) 60%, var(--text)); }
    .oauth-btn svg { width: 1.1rem; height: 1.1rem; flex-shrink: 0; }

    .error-msg {
      background: #fff0f0; color: #c0392b; border-radius: 0.65rem;
      padding: 0.65rem 0.85rem; font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
    .error-msg.visible { display: block; }
    [data-theme="dark"] .error-msg { background: #3a1a1a; color: #f87171; }

    .setup-badge {
      display: inline-block;
      background: color-mix(in srgb, var(--primary) 12%, transparent);
      color: var(--primary);
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      border-radius: 9999px; padding: 0.2rem 0.65rem;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-brand-icon">
      <span class="material-symbols-outlined">skillet</span>
    </div>
    <h1>The Editorial Kitchen</h1>
    <p>Curated Atelier</p>
  </div>

  <div class="login-card">
    <div id="error-msg" class="error-msg"></div>

    <!-- OAuth buttons (shown when providers configured) -->
    <div id="oauth-section" style="display:none">
      <div id="oauth-buttons"></div>
      <div class="divider">or sign in with email</div>
    </div>

    <!-- Sign-in form (default) -->
    <div id="signin-view">
      <div class="card-heading">Sign In</div>
      <form id="signin-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="signin-email">Email</label>
          <input type="email" id="signin-email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signin-password">Password</label>
          <input type="password" id="signin-password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary" id="signin-btn">Sign In</button>
      </form>
    </div>

    <!-- First-run setup (shown only when no users exist) -->
    <div id="setup-view" style="display:none">
      <div class="setup-badge">First-time Setup</div>
      <div class="card-heading">Create Admin Account</div>
      <form id="setup-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="setup-name">Your Name</label>
          <input type="text" id="setup-name" class="form-input" placeholder="Name" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="setup-email">Email</label>
          <input type="email" id="setup-email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="setup-password">Password</label>
          <input type="password" id="setup-password" class="form-input" placeholder="••••••••" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-primary" id="setup-btn">Create Account &amp; Sign In</button>
      </form>
    </div>
  </div>
</div>

<script>
  const PROVIDER_META = {
    google: {
      label: 'Continue with Google',
      svg: `<svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`
    },
    microsoft: {
      label: 'Continue with Microsoft',
      svg: `<svg viewBox="0 0 24 24"><path fill="#F35325" d="M1 1h10v10H1z"/><path fill="#81BC06" d="M13 1h10v10H13z"/><path fill="#05A6F0" d="M1 13h10v10H1z"/><path fill="#FFBA08" d="M13 13h10v10H13z"/></svg>`
    },
    facebook: {
      label: 'Continue with Facebook',
      svg: `<svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047v-2.66c0-3.025 1.791-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.971h-1.513c-1.491 0-1.956.931-1.956 1.886v2.264h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>`
    }
  };

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function clearError() {
    document.getElementById('error-msg').classList.remove('visible');
  }
  function redirect() {
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('next') || '/';
  }

  // Attach form handlers immediately — no waiting for init()
  document.getElementById('signin-form').addEventListener('submit', async e => {
    e.preventDefault();
    clearError();
    const btn = document.getElementById('signin-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('signin-email').value,
          password: document.getElementById('signin-password').value,
        })
      });
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      redirect();
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  document.getElementById('setup-form').addEventListener('submit', async e => {
    e.preventDefault();
    clearError();
    const btn = document.getElementById('setup-btn');
    btn.disabled = true;
    btn.textContent = 'Creating…';
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('setup-email').value,
          display_name: document.getElementById('setup-name').value,
          password: document.getElementById('setup-password').value,
        })
      });
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      redirect();
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Create Account & Sign In';
    }
  });

  // init: check auth state and configure page
  (async () => {
    try {
      // Already logged in → go home
      const meRes = await fetch('/api/auth/me');
      if (meRes.ok) { redirect(); return; }

      const res = await fetch('/api/auth/config');
      const json = await res.json();
      const config = json.data || {};

      // Auth disabled → go home
      if (!config.enabled) { redirect(); return; }

      // Show OAuth buttons
      if (config.providers && config.providers.length > 0) {
        const section = document.getElementById('oauth-section');
        const buttons = document.getElementById('oauth-buttons');
        section.style.display = '';
        config.providers.forEach(p => {
          const meta = PROVIDER_META[p];
          if (!meta) return;
          const btn = document.createElement('a');
          btn.className = 'oauth-btn';
          btn.href = `/api/auth/oauth/start?provider=${p}`;
          btn.innerHTML = meta.svg + meta.label;
          buttons.appendChild(btn);
        });
      }

      // First-run: no users yet → show setup view instead of sign-in
      if (!config.has_users) {
        document.getElementById('signin-view').style.display = 'none';
        document.getElementById('setup-view').style.display = '';
      }
    } catch (err) {
      // Leave sign-in form visible — user can still try logging in
      console.error('auth init error:', err);
    }
  })();
</script>
</body>
</html>
